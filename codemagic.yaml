workflows:
  ios-testflight:
    name: iOS TestFlight Beta
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
        TEAM_ID: "Q7XPYDQ69X"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles --verbose

      - name: Show signing info
        script: |
          echo "=== Installed Provisioning Profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles found"
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            [ -f "$f" ] || continue
            echo "--- Profile: $f ---"
            security cms -D -i "$f" 2>/dev/null | grep -A1 -E "<key>Name</key>|<key>UUID</key>|<key>TeamIdentifier</key>|<key>ApplicationIdentifierPrefix</key>" | head -20
          done
          echo ""
          echo "=== Code Signing Identities ==="
          security find-identity -v -p codesigning 2>/dev/null || echo "No identities found"
          echo ""
          echo "=== Xcode project signing settings ==="
          xcodebuild -showBuildSettings \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release 2>/dev/null | grep -E "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM" || echo "Could not read build settings"

      - name: Build iOS IPA
        script: |
          # flutter build ipa uses xcodebuild internally with proper signing
          flutter build ipa \
            --release \
            --dart-define=flutter.inspector.structuredErrors=false \
            --export-method=app-store \
            --verbose 2>&1 | tail -100
          echo "--- IPA search ---"
          find . -name "*.ipa" 2>/dev/null || echo "No IPA found"
          ls -la build/ios/ipa/ 2>/dev/null || echo "build/ios/ipa/ not found"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
        TEAM_ID: "Q7XPYDQ69X"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
