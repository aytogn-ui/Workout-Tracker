workflows:
  ios-testflight:
    name: iOS TestFlight Beta
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles --verbose

      - name: Show signing info
        script: |
          echo "=== Provisioning Profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles found"
          echo "=== Keychain certs ==="
          security find-identity -v -p codesigning 2>/dev/null || echo "No certs found"

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --dart-define=flutter.inspector.structuredErrors=false \
            --export-method=app-store
          echo "--- IPA検索 ---"
          find . -name "*.ipa" 2>/dev/null || echo "IPA not found"
          ls -la build/ios/ipa/ 2>/dev/null || echo "build/ios/ipa/ なし"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles --verbose

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --dart-define=flutter.inspector.structuredErrors=false \
            --export-method=app-store

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
