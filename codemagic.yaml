workflows:
  ios-testflight:
    name: iOS TestFlight Beta
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
        TEAM_ID: "Q7XPYDQ69X"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles --verbose

      - name: Build Flutter (no codesign)
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=flutter.inspector.structuredErrors=false
          echo "=== Flutter build ios complete ==="
          ls -la build/ios/Release-iphoneos/ | head -20 || echo "Release-iphoneos not found"

      - name: Archive with xcodebuild
        script: |
          # プロファイルUUIDを取得
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          echo "Using profile: $PROFILE_PATH"
          
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
            python3 -c "import sys, plistlib; d=plistlib.load(sys.stdin.buffer); print(d['UUID'])")
          echo "Profile UUID: $PROFILE_UUID"
          
          mkdir -p build/ios/archive
          
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$PWD/build/ios/archive/Runner.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="WorkoutTracker_AppStore" \
            archive
          
          echo "=== Archive result ==="
          ls -la build/ios/archive/ || echo "Archive directory empty"

      - name: Export IPA
        script: |
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
            python3 -c "import sys, plistlib; d=plistlib.load(sys.stdin.buffer); print(d['UUID'])")
          
          cat > /tmp/ExportOptions.plist << PLIST_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>Q7XPYDQ69X</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.workouttracker.log</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          PLIST_EOF
          
          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist
          
          mkdir -p build/ios/ipa
          
          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/build/ios/archive/Runner.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$PWD/build/ios/ipa"
          
          echo "=== IPA result ==="
          find build/ios/ipa -name "*.ipa" || echo "No IPA found"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

