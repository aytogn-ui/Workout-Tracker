workflows:
  ios-testflight:
    name: iOS TestFlight Beta
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
        TEAM_ID: "Q7XPYDQ69X"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles --verbose

      - name: Show signing info
        script: |
          echo "=== Provisioning Profiles installed ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null && \
            for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
              echo "--- $f ---"
              security cms -D -i "$f" 2>/dev/null | grep -E "<key>Name</key>|<key>UUID</key>|<key>TeamIdentifier</key>" | head -6
            done || echo "No profiles found"
          echo ""
          echo "=== Code signing identities ==="
          security find-identity -v -p codesigning 2>/dev/null || echo "No certs found"

      - name: Build Flutter (no codesign)
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=flutter.inspector.structuredErrors=false

      - name: Archive and Export IPA
        script: |
          # アーカイブ作成
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            "PROVISIONING_PROFILE_SPECIFIER=WorkoutTracker_AppStore" \
            archive \
            | xcpretty

          echo "=== Archive確認 ==="
          ls -la build/ios/archive/ || echo "Archive not found"

          # ExportOptions作成
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.workouttracker.log</key>
              <string>WorkoutTracker_AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF

          # IPA出力
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa \
            | xcpretty

          echo "=== IPA確認 ==="
          find build/ios/ipa -name "*.ipa" 2>/dev/null || echo "IPA not found"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/**
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

