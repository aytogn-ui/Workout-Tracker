workflows:
  ios-testflight:
    name: iOS TestFlight Beta
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
        XCODE_SCHEME: "Runner"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles
          # 証明書の確認
          security find-identity -v -p codesigning
          # プロファイルの確認
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null | head -5

      - name: Build iOS IPA
        script: |
          # CODE_SIGN_IDENTITY と PROVISIONING_PROFILE_SPECIFIER を明示
          flutter build ipa \
            --release \
            --dart-define=flutter.inspector.structuredErrors=false \
            --no-codesign || true

          # xcarchive から手動でIPA作成
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates 2>&1 | tail -20

          ls -la build/ios/ipa/ 2>/dev/null || echo "IPAディレクトリなし"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workouttracker.log
      vars:
        BUNDLE_ID: "com.workouttracker.log"
      flutter: 3.35.4
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Flutter analyze
        script: |
          flutter analyze || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --dart-define=flutter.inspector.structuredErrors=false

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
